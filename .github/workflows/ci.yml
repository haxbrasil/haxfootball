name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    checks:
        name: Build and Lint
        runs-on: ubuntu-latest
        env:
            DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Setup pnpm
              run: corepack enable

            - name: Install dependencies
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Format
              run: pnpm run format:ci

            - name: Lint
              run: pnpm run lint

            - name: Typecheck
              run: pnpm exec tsc --noEmit

            - name: State transitions
              run: pnpm run states:check

            - name: Test
              run: pnpm test -- --run

            - name: Build OpenAI prompt
              if: always() && env.OPENAI_API_KEY != ''
              id: openai_prompt
              continue-on-error: true
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BEFORE_SHA: ${{ github.event.before }}
                  PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
                  HEAD_SHA: ${{ github.sha }}
              run: |
                  if [ "$EVENT_NAME" = "pull_request" ] && [ -n "${PR_BASE_SHA:-}" ] && [ -n "${PR_HEAD_SHA:-}" ]; then
                    RANGE="$PR_BASE_SHA...$PR_HEAD_SHA"
                  elif [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
                    RANGE="$BEFORE_SHA...$HEAD_SHA"
                  elif git rev-parse HEAD~1 >/dev/null 2>&1; then
                    RANGE="$(git rev-parse HEAD~1)...$HEAD_SHA"
                  else
                    RANGE="$HEAD_SHA"
                  fi

                  git diff --name-status "$RANGE" > /tmp/changed_files.txt || true
                  git diff --numstat "$RANGE" > /tmp/changed_files_numstat.txt || true
                  git diff --stat "$RANGE" > /tmp/changes.stat || true
                  git diff --unified=0 "$RANGE" | rg '^@@' | head -n 120 > /tmp/changes.hunks || true
                  git diff --unified=0 "$RANGE" > /tmp/changes.patch || true
                  head -c 50000 /tmp/changes.patch > /tmp/changes.trim.patch || true

                  python3 - <<'PY'
                  from pathlib import Path

                  def classify(path: str) -> str:
                      if path.startswith("src/meta/legacy/states/"):
                          return "Gameplay states"
                      if path.startswith("src/meta/legacy/shared/"):
                          return "Shared gameplay logic"
                      if path.startswith("src/meta/legacy/hooks/"):
                          return "Gameplay hooks"
                      if path.startswith("src/runtime/"):
                          return "Runtime/engine"
                      if path.startswith("src/room/"):
                          return "Room integration"
                      if path.startswith("src/common/"):
                          return "Core utilities"
                      if path.startswith("src/locales/"):
                          return "Localization"
                      if path.startswith(".github/workflows/"):
                          return "CI workflow"
                      if path.startswith("docs/"):
                          return "Documentation"
                      return "Other"

                  lines = []
                  for raw in Path("/tmp/changed_files_numstat.txt").read_text().splitlines():
                      parts = raw.split("\t", 2)
                      if len(parts) != 3:
                          continue
                      added, deleted, path = parts
                      added_label = added if added != "-" else "?"
                      deleted_label = deleted if deleted != "-" else "?"
                      lines.append(
                          f"- {path} (+{added_label}/-{deleted_label}) [{classify(path)}]"
                      )

                  Path("/tmp/changed_files_context.txt").write_text(
                      "\n".join(lines[:40])
                  )
                  PY

                  SYSTEM_PROMPT="You write CI changelog blurbs for Discord. Return 1-4 concise bullets as plain text, max 700 chars. Mention what changed from a user-facing, gameplay standpoint, not a technical one. Use the file-area context to avoid vague summaries. Do not use marketing terms or language, just clear descriptions, we are not trying to hype the changes, just summarize them. Do not talk about changes in translation that are being done as part of a gameplay feature update, only do it if doesn't accompany a gameplay change."
                  USER_PROMPT="$(cat <<'EOF'
                  Changed files:
                  EOF
                  )"

                  USER_PROMPT="$USER_PROMPT
                  $(cat /tmp/changed_files.txt)

                  Changed files context (path, churn, area):
                  $(cat /tmp/changed_files_context.txt)

                  Diff stat:
                  $(cat /tmp/changes.stat)

                  Hunk headers:
                  $(cat /tmp/changes.hunks)

                  Patch snippet:
                  $(cat /tmp/changes.trim.patch)"

                  PARAMS="$(
                    jq -nc \
                      --arg model "gpt-4o-mini" \
                      --arg system "$SYSTEM_PROMPT" \
                      --arg user "$USER_PROMPT" \
                      '{
                        model: $model,
                        messages: [
                          { role: "system", content: $system },
                          { role: "user", content: $user }
                        ],
                        temperature: 0.2,
                        max_tokens: 220
                      }'
                  )"

                  {
                    echo "params<<EOF"
                    echo "$PARAMS"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Summarize changes with OpenAI
              if: always() && env.OPENAI_API_KEY != '' && steps.openai_prompt.outputs.params != ''
              id: openai
              continue-on-error: true
              env:
                  INPUT_MODE: chat
              uses: Just-Moh-it/openai@v0.0.1
              with:
                  openai-api-key: ${{ env.OPENAI_API_KEY }}
                  openai-mode: "chat"
                  openai-params: ${{ steps.openai_prompt.outputs.params }}

            - name: Normalize OpenAI summary
              if: always() && steps.openai.outputs.completion != ''
              id: openai_summary
              env:
                  OPENAI_COMPLETION: ${{ steps.openai.outputs.completion }}
              run: |
                  SUMMARY="$(python3 - <<'PY'
                  import os

                  text = os.environ.get("OPENAI_COMPLETION", "")
                  text = text.replace("\r\n", "\n").replace("\r", "\n").strip()
                  text = "\n".join(line.rstrip() for line in text.split("\n"))
                  print(text[:900], end="")
                  PY
                  )"

                  {
                    echo "summary<<EOF"
                    echo "$SUMMARY"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Prepare Discord metadata
              if: always() && env.DISCORD_WEBHOOK_URL != ''
              id: discord
              env:
                  JOB_STATUS: ${{ job.status }}
                  EVENT_NAME: ${{ github.event_name }}
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
                  OPENAI_SUMMARY: ${{ steps.openai_summary.outputs.summary }}
              run: |
                  case "$JOB_STATUS" in
                    success)
                      TITLE="✅ CI Passed"
                      COLOR="5763719"
                      ;;
                    failure)
                      TITLE="❌ CI Failed"
                      COLOR="15548997"
                      ;;
                    cancelled)
                      TITLE="⚠️ CI Cancelled"
                      COLOR="16705372"
                      ;;
                    *)
                      TITLE="ℹ️ CI Finished"
                      COLOR="5793266"
                      ;;
                  esac

                  if [ -n "${OPENAI_SUMMARY:-}" ]; then
                    DETAILS="$OPENAI_SUMMARY"
                  elif [ "$EVENT_NAME" = "pull_request" ] && [ -n "${PR_TITLE:-}" ]; then
                    DETAILS="PR: ${PR_TITLE}"
                  elif [ -n "${COMMIT_MSG:-}" ]; then
                    DETAILS="Commit: ${COMMIT_MSG}"
                  else
                    DETAILS="No commit summary available."
                  fi

                  DETAILS="$(printf '%s' "$DETAILS" | head -c 900)"

                  {
                    echo "title=$TITLE"
                    echo "color=$COLOR"
                    echo "details<<EOF"
                    echo "$DETAILS"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Notify Discord
              if: always() && env.DISCORD_WEBHOOK_URL != ''
              uses: tsickert/discord-webhook@v7.0.0
              with:
                  webhook-url: ${{ env.DISCORD_WEBHOOK_URL }}
                  wait: true
                  embed-title: ${{ steps.discord.outputs.title }}
                  embed-color: ${{ steps.discord.outputs.color }}
                  embed-description: |
                      **Repository:** `${{ github.repository }}`
                      **Branch:** `${{ github.ref_name }}`
                      **Status:** `${{ job.status }}`
                      **Event:** `${{ github.event_name }}`
                      **Workflow:** `${{ github.workflow }}`
                      **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
                      **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

                      ${{ steps.discord.outputs.details }}
                  embed-footer-text: ${{ github.repository }} • CI Bot
                  embed-author-name: Triggered by ${{ github.actor }}
                  embed-author-url: ${{ github.server_url }}/${{ github.actor }}
                  embed-author-icon-url: https://github.com/${{ github.actor }}.png
                  embed-timestamp: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at || github.event.repository.updated_at }}

            - name: Skip Discord notification
              if: always() && env.DISCORD_WEBHOOK_URL == ''
              run: echo "DISCORD_WEBHOOK_URL is not set; skipping notification."

    staging:
        name: Register Staging Room Build
        runs-on: ubuntu-latest
        needs: checks
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        env:
            STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
            STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
            STAGING_ROOM_PROGRAM_ID: ${{ secrets.STAGING_ROOM_PROGRAM_ID }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Setup pnpm
              run: corepack enable

            - name: Install dependencies
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Check staging configuration
              id: staging_config
              run: |
                  if [ -z "${STAGING_API_URL:-}" ] || [ -z "${STAGING_API_KEY:-}" ] || [ -z "${STAGING_ROOM_PROGRAM_ID:-}" ]; then
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    echo "Staging secrets are not fully configured; skipping staging registration."
                    exit 0
                  fi

                  echo "enabled=true" >> "$GITHUB_OUTPUT"

            - name: Derive staging version
              if: steps.staging_config.outputs.enabled == 'true'
              id: staging_version
              env:
                  REF_NAME: ${{ github.ref_name }}
                  HEAD_SHA: ${{ github.sha }}
              run: |
                  branch_key="$(
                    printf '%s' "$REF_NAME" |
                    tr '[:upper:]' '[:lower:]' |
                    sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' |
                    cut -c 1-48 |
                    sed -E 's/-+$//'
                  )"

                  if [ -z "$branch_key" ]; then
                    branch_key="branch"
                  fi

                  short_sha="$(printf '%s' "$HEAD_SHA" | cut -c 1-8)"
                  version="${branch_key}@${short_sha}"
                  alias="${branch_key}-latest"
                  asset_name="room-${branch_key}-${short_sha}.tgz"

                  {
                    echo "branch_key=$branch_key"
                    echo "short_sha=$short_sha"
                    echo "version=$version"
                    echo "alias=$alias"
                    echo "asset_name=$asset_name"
                  } >> "$GITHUB_OUTPUT"

            - name: Package and validate room artifact
              if: steps.staging_config.outputs.enabled == 'true'
              id: package
              env:
                  ASSET_NAME: ${{ steps.staging_version.outputs.asset_name }}
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  package_dir="$RUNNER_TEMP/staging-package"
                  install_dir="$RUNNER_TEMP/staging-install"
                  mkdir -p "$package_dir" "$install_dir"

                  packed_path="$(pnpm pack --pack-destination "$package_dir" | tail -n 1)"
                  asset_path="$package_dir/$ASSET_NAME"
                  mv "$packed_path" "$asset_path"

                  tar -tzf "$asset_path" | grep -Fx 'package/package.json'
                  tar -tzf "$asset_path" | grep -Fx 'package/dist/environments/room-server.js'
                  npm install --omit=dev --prefix "$install_dir" "$asset_path"

                  {
                    echo "asset_path=$asset_path"
                  } >> "$GITHUB_OUTPUT"

            - name: Authenticate with staging API
              if: steps.staging_config.outputs.enabled == 'true'
              id: staging_auth
              run: |
                  api_url="${STAGING_API_URL%/}"
                  token="$(
                    curl --fail-with-body -sS "$api_url/auth" \
                      -H 'content-type: application/json' \
                      -d "$(jq -nc --arg apiKey "$STAGING_API_KEY" '{ apiKey: $apiKey }')" |
                    jq -r '.token'
                  )"

                  if [ -z "$token" ] || [ "$token" = "null" ]; then
                    echo "Staging auth response did not include a token." >&2
                    exit 1
                  fi

                  echo "token=$token" >> "$GITHUB_OUTPUT"

            - name: Upload staging artifact
              if: steps.staging_config.outputs.enabled == 'true'
              id: staging_upload
              env:
                  TOKEN: ${{ steps.staging_auth.outputs.token }}
                  BRANCH_KEY: ${{ steps.staging_version.outputs.branch_key }}
                  SHORT_SHA: ${{ steps.staging_version.outputs.short_sha }}
                  ASSET_NAME: ${{ steps.staging_version.outputs.asset_name }}
                  ASSET_PATH: ${{ steps.package.outputs.asset_path }}
              run: |
                  api_url="${STAGING_API_URL%/}"
                  response_path="$RUNNER_TEMP/staging-upload.json"

                  curl --fail-with-body -sS \
                    "$api_url/api/room-programs/$STAGING_ROOM_PROGRAM_ID/artifacts" \
                    -H "authorization: Bearer $TOKEN" \
                    -F "branch=$BRANCH_KEY" \
                    -F "sha=$SHORT_SHA" \
                    -F "assetName=$ASSET_NAME" \
                    -F "file=@$ASSET_PATH;type=application/gzip" \
                    -o "$response_path"

                  {
                    echo "asset_name=$(jq -r '.assetName' "$response_path")"
                    echo "asset_url=$(jq -r '.assetUrl' "$response_path")"
                    echo "checksum_sha256=$(jq -r '.checksumSha256' "$response_path")"
                  } >> "$GITHUB_OUTPUT"

            - name: Register staging version and alias
              if: steps.staging_config.outputs.enabled == 'true'
              env:
                  TOKEN: ${{ steps.staging_auth.outputs.token }}
                  VERSION: ${{ steps.staging_version.outputs.version }}
                  ALIAS: ${{ steps.staging_version.outputs.alias }}
                  SHORT_SHA: ${{ steps.staging_version.outputs.short_sha }}
                  ASSET_NAME: ${{ steps.staging_upload.outputs.asset_name }}
                  ASSET_URL: ${{ steps.staging_upload.outputs.asset_url }}
                  CHECKSUM_SHA256: ${{ steps.staging_upload.outputs.checksum_sha256 }}
              run: |
                  api_url="${STAGING_API_URL%/}"
                  version_body="$(
                    jq -nc \
                      --arg version "$VERSION" \
                      --arg releaseId "$SHORT_SHA" \
                      --arg assetName "$ASSET_NAME" \
                      --arg assetUrl "$ASSET_URL" \
                      --arg checksumSha256 "$CHECKSUM_SHA256" \
                      '{
                        version: $version,
                        artifact: {
                          releaseId: $releaseId,
                          tagName: $version,
                          assetName: $assetName,
                          assetUrl: $assetUrl,
                          publishedAt: (now | todateiso8601),
                          checksumSha256: $checksumSha256
                        },
                        entrypoint: "dist/environments/room-server.js",
                        installStrategy: "npm-install"
                      }'
                  )"

                  curl --fail-with-body -sS \
                    "$api_url/api/room-programs/$STAGING_ROOM_PROGRAM_ID/versions" \
                    -H "authorization: Bearer $TOKEN" \
                    -H 'content-type: application/json' \
                    -d "$version_body" \
                    >/dev/null

                  alias_body="$(jq -nc --arg version "$VERSION" '{ version: $version }')"

                  curl --fail-with-body -sS -X PUT \
                    "$api_url/api/room-programs/$STAGING_ROOM_PROGRAM_ID/version-aliases/$ALIAS" \
                    -H "authorization: Bearer $TOKEN" \
                    -H 'content-type: application/json' \
                    -d "$alias_body" \
                    >/dev/null
