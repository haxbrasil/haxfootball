name: Release Room

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Release version, for example v1.0.40"
                required: true
                type: string
    push:
        tags:
            - "v*"

permissions:
    contents: write
    packages: read

concurrency:
    group: release-room-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        name: Package and Publish Room Release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Setup pnpm
              run: corepack enable

            - name: Install dependencies
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Format
              run: pnpm run format:ci

            - name: Lint
              run: pnpm run lint

            - name: Typecheck
              run: pnpm exec tsc --noEmit

            - name: State transitions
              run: pnpm run states:check

            - name: Test
              run: pnpm test -- --run

            - name: Derive release metadata
              id: release
              env:
                  REF_NAME: ${{ github.ref_name }}
                  VERSION_INPUT: ${{ inputs.version }}
              run: |
                  version="${VERSION_INPUT:-$REF_NAME}"
                  if [ "${version#v}" = "$version" ]; then
                    version="v$version"
                  fi

                  if ! printf '%s' "$version" | grep -Eq '^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$'; then
                    echo "Invalid release version: $version" >&2
                    exit 1
                  fi

                  package_version="$(node -p "require('./package.json').version")"
                  if [ "$version" != "v$package_version" ]; then
                    echo "Release version $version does not match package.json version $package_version." >&2
                    exit 1
                  fi

                  {
                    echo "version=$version"
                    echo "asset_name=room-$version.tgz"
                  } >> "$GITHUB_OUTPUT"

            - name: Package room artifact
              id: package
              env:
                  ASSET_NAME: ${{ steps.release.outputs.asset_name }}
              run: |
                  package_dir="$RUNNER_TEMP/room-package"
                  install_dir="$RUNNER_TEMP/room-install"
                  mkdir -p "$package_dir" "$install_dir"

                  packed_path="$(pnpm pack --pack-destination "$package_dir" | tail -n 1)"
                  asset_path="$package_dir/$ASSET_NAME"
                  mv "$packed_path" "$asset_path"

                  tar -tzf "$asset_path" | grep -Fx 'package/package.json'
                  tar -tzf "$asset_path" | grep -Fx 'package/dist/environments/room-server.js'

                  if tar -tzf "$asset_path" | grep -E '(^|/)pnpm-lock\.yaml$|(^|/)package-lock\.json$|(^|/)yarn\.lock$'; then
                    echo "Room artifact must not include package manager lockfiles." >&2
                    exit 1
                  fi

                  npm install --omit=dev --prefix "$install_dir" "$asset_path"

                  checksum_sha256="$(sha256sum "$asset_path" | awk '{print $1}')"
                  size_bytes="$(wc -c < "$asset_path")"

                  {
                    echo "asset_path=$asset_path"
                    echo "checksum_sha256=$checksum_sha256"
                    echo "size_bytes=$size_bytes"
                  } >> "$GITHUB_OUTPUT"

            - name: Publish GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ steps.release.outputs.version }}
                  ASSET_NAME: ${{ steps.release.outputs.asset_name }}
                  ASSET_PATH: ${{ steps.package.outputs.asset_path }}
                  CHECKSUM_SHA256: ${{ steps.package.outputs.checksum_sha256 }}
                  SIZE_BYTES: ${{ steps.package.outputs.size_bytes }}
              run: |
                  notes="$(
                    cat <<EOF
                  Room package artifact.

                  Asset: $ASSET_NAME
                  SHA256: $CHECKSUM_SHA256
                  Size: $SIZE_BYTES bytes
                  EOF
                  )"

                  if gh release view "$VERSION" >/dev/null 2>&1; then
                    gh release upload "$VERSION" "$ASSET_PATH#$ASSET_NAME" --clobber
                    gh release edit "$VERSION" --notes "$notes"
                  else
                    gh release create "$VERSION" "$ASSET_PATH#$ASSET_NAME" \
                      --title "$VERSION" \
                      --notes "$notes"
                  fi

                  echo "Published $ASSET_NAME"
                  echo "SHA256: $CHECKSUM_SHA256"
                  echo "Size: $SIZE_BYTES bytes"
